# Custom: enable ZMK pointing so the Miryoku MOUSE layer works
# (&mmv move / &msc scroll / &mkp click). Applied to all images via
# -DEXTRA_CONF_FILE in build-all.sh. Without this the mouse layer is inert.

CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
